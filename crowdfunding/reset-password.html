<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GreenFund</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="api.js"></script>
    <script src="script.js"></script>
    <style>
        .toggle-password {
            background: none;
            border: none;
            cursor: pointer;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            width: 36px;
            height: 36px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="nav-logo">
                    <i class="fas fa-leaf"></i>
                    <span>GreenFund</span>
                </a>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="campaigns.html">Campaigns</a></li>
                    <li><a href="start-campaign.html">Start Campaign</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <div class="nav-auth-links" id="navAuthLinks">
                    <a href="login.html" class="nav-login-btn">Login</a>
                    <a href="admin-login.html" class="nav-admin-btn">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Reset Password Section -->
    <section class="user-login">
        <div class="container">
            <div class="login-container">
                <div class="login-header">
                    <i class="fas fa-unlock-alt" style="font-size: 3rem; color: #00ff66; margin-bottom: 1.5rem;"></i>
                    <h1>Choose New Password</h1>
                    <p>Enter your new password below. Make sure it contains at least one uppercase letter, one lowercase letter, and one number.</p>
                </div>
                
                <form id="resetPasswordForm" class="login-form">
                    <div class="form-group">
                        <label for="password">New Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" required minlength="8" placeholder="Enter new password">
                            <span class="toggle-password" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" placeholder="Confirm new password">
                            <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login" id="submitBtn">
                        <i class="fas fa-check-circle"></i>
                        Update Password
                    </button>
                </form>

                <div class="login-footer" style="margin-top: 2rem;">
                    <p><a href="login.html" class="signup-link">Back to login</a></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function togglePasswordVisibility(inputId, spanEl) {
            const input = document.getElementById(inputId);
            const icon = spanEl.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                if (window.showNotification) {
                    window.showNotification('Passwords do not match.', 'error');
                } else {
                    alert('Passwords do not match.');
                }
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) {
                if (window.showNotification) {
                    window.showNotification('Reset token is missing from the link. Please request a new email.', 'error');
                } else {
                    alert('Reset token is missing.');
                }
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
            submitBtn.disabled = true;

            try {
                const res = await AuthAPI.resetPassword(token, password);
                if (window.showNotification) {
                    window.showNotification(res.message || 'Password successfully updated!', 'success');
                } else {
                    alert(res.message || 'Password successfully updated!');
                }
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                if (window.showNotification) {
                    window.showNotification(error.message || 'Failed to reset password.', 'error');
                } else {
                    alert(error.message || 'Failed to reset password.');
                }
            } finally {
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Update Password';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
