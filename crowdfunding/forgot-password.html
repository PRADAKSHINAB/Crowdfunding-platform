<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - GreenFund</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="api.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="nav-logo">
                    <i class="fas fa-leaf"></i>
                    <span>GreenFund</span>
                </a>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="campaigns.html">Campaigns</a></li>
                    <li><a href="start-campaign.html">Start Campaign</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <div class="nav-auth-links" id="navAuthLinks">
                    <a href="login.html" class="nav-login-btn">Login</a>
                    <a href="admin-login.html" class="nav-admin-btn">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Forgot Password Section -->
    <section class="user-login">
        <div class="container">
            <div class="login-container">
                <div class="login-header">
                    <i class="fas fa-key" style="font-size: 3rem; color: #00ff66; margin-bottom: 1.5rem;"></i>
                    <h1>Reset Password</h1>
                    <p>Enter your email address and we'll send you a link to reset your password.</p>
                </div>
                
                <form id="forgotPasswordForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" required placeholder="Enter your registered email">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login" id="submitBtn">
                        <i class="fas fa-paper-plane"></i>
                        Send Reset Link
                    </button>
                </form>

                <div class="login-footer" style="margin-top: 2rem;">
                    <p>Remembered your password? <a href="login.html" class="signup-link">Back to login</a></p>
                    <a href="index.html" class="back-link">
                        <i class="fas fa-arrow-left"></i>
                        Back to Home
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;

            try {
                const res = await AuthAPI.forgotPassword(email);
                if (window.showNotification) {
                    window.showNotification(res.message || 'Verification link sent to email.', 'success');
                } else {
                    alert(res.message || 'Verification link sent to email.');
                }
                document.getElementById('forgotPasswordForm').reset();
            } catch (error) {
                if (window.showNotification) {
                    window.showNotification(error.message || 'Failed to send reset link.', 'error');
                } else {
                    alert(error.message || 'Failed to send reset link.');
                }
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
